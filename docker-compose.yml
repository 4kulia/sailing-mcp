services:
  windy-mcp:
    build: .
    image: windy-mcp:latest
    restart: unless-stopped
    environment:
      PORT: 8787
      HOST: 0.0.0.0
      MCP_PATH: /mcp
    expose:
      - "8787"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - windy-mcp
    networks:
      - web

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
